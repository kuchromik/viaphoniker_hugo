backend:
  name: git-gateway
  branch: master

media_folder: assets/img
public_folder: /img

collections:
  - name: 'pages'
    label: 'Seiten'
    files:

      # ==========================================
      # GRUPPE 1: Nur Markdown-Text im Body
      # ==========================================
      - file: "content/intern.md"
        label: "Intern (Gruppe 1)"
        name: "intern"
        editor:
          preview: false
        fields: &fields_gruppe1
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Veröffentlichungsdatum", name: "date", widget: "datetime" }
          - { label: "Letzte Änderung", name: "lastmod", widget: "datetime" }
          - { label: "Menü-Sortierung (Gewichtung)", name: "weight", widget: "number", value_type: "int", required: false }
          - { label: "Seiteninhalt", name: "body", widget: "markdown" }

      - file: "content/retro.md"
        label: "Retro (Gruppe 1)"
        name: "retro"
        editor:
          preview: false
        fields: *fields_gruppe1


      # ==========================================
      # GRUPPE 2: Nur die Cards
      # ==========================================
      - file: "content/contact.md"
        label: "Kontakt (Gruppe 2)"
        name: "contact"
        editor:
          preview: false
        fields: &fields_gruppe2
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Veröffentlichungsdatum", name: "date", widget: "datetime" }
          - { label: "Letzte Änderung", name: "lastmod", widget: "datetime" }
          - { label: "Menü-Sortierung (Gewichtung)", name: "weight", widget: "number", value_type: "int", required: false }
          - label: "Inhalts-Karten"
            name: "cards"
            widget: "list"
            summary: '{{fields.title}}'
            fields:
              - { label: "Karten-Titel", name: "title", widget: "string" }
              - { label: "Karten-Text", name: "text", widget: "markdown" }
              - { label: "Karten-Bild", name: "image", widget: "image", required: false }
              - { label: "Link-URL", name: "link", widget: "string", required: false }
              - { label: "Link-Text", name: "linktext", widget: "string", required: false }

      - file: "content/friends.md"
        label: "Freunde / Partner (Gruppe 2)"
        name: "friends"
        editor:
          preview: false
        fields: *fields_gruppe2

      # Zukünftige Seite (aktuell inaktiv). Zum Aktivieren einfach die '#' in den nächsten 6 Zeilen löschen!
      # - file: "content/musicans.md"
      #   label: "Musiker (Gruppe 2)"
      #   name: "musicans"
      #   editor:
      #     preview: false
      #   fields: *fields_gruppe2


      # ==========================================
      # GRUPPE 3: Untertitel, Hintergrundbild, Teaser-Text
      # ==========================================
      - file: "content/weekend_practice.md"
        label: "Wochenend-Praxis (Gruppe 3)"
        name: "weekend_practice"
        editor:
          preview: false
        fields: &fields_gruppe3
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Untertitel", name: "subtitle", widget: "string" }
          - { label: "Veröffentlichungsdatum", name: "date", widget: "datetime" }
          - { label: "Letzte Änderung", name: "lastmod", widget: "datetime" }
          - { label: "Hintergrundbild", name: "featured_image", widget: "image" }
          - { label: "Teaser-Text", name: "featured_text", widget: "text" }
          - { label: "Teaser-Link", name: "featured_link", widget: "string", required: false }
          - { label: "Menü-Sortierung (Gewichtung)", name: "weight", widget: "number", value_type: "int", required: false }
          - { label: "Seiteninhalt", name: "body", widget: "markdown", required: false }

      - file: "content/_index.md"
        label: "Startseite (Gruppe 3)"
        name: "home"
        editor:
          preview: false
        fields: *fields_gruppe3


      # ==========================================
      # GRUPPE 4: Wie Gruppe 3 + Teaser-Video
      # ==========================================
      - file: "content/weekly_practice.md"
        label: "Wöchentliche Praxis (Gruppe 4)"
        name: "weekly_practice"
        editor:
          preview: false
        fields:
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Untertitel", name: "subtitle", widget: "string" }
          - { label: "Veröffentlichungsdatum", name: "date", widget: "datetime" }
          - { label: "Letzte Änderung", name: "lastmod", widget: "datetime" }
          - { label: "Hintergrundbild", name: "featured_image", widget: "image" }
          - { label: "Teaser-Text", name: "featured_text", widget: "text" }
          - { label: "Teaser-Link", name: "featured_link", widget: "string", required: false }
          - { label: "Teaser-Video", name: "featured_video", widget: "string" }
          - { label: "Menü-Sortierung (Gewichtung)", name: "weight", widget: "number", value_type: "int", required: false }
          - { label: "Seiteninhalt", name: "body", widget: "markdown", required: false }
